name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Start up a PostgreSQL database with pgvector installed 
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: rag_user
          POSTGRES_DB: rag_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests 
      env:
        DATABASE_URL: postgresql://rag_user:rag_user@localhost:5432/rag_db
      run: |
        pytest || echo "No unit tests found or tests failed"
        python -m src.evaluation.benchmark 1
