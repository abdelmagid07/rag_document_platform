<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Stream Test</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
        }

        #output {
            white-space: pre-wrap;
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            min-height: 100px;
            border: 1px solid #334155;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .status {
            color: #94a3b8;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h2>RAG Streaming Test</h2>
    <div class="status" id="status">Ready</div>
    <input type="text" id="user_id" value="test-user-1" placeholder="User ID" style="margin-bottom: 5px;" />
    <input type="text" id="query" value="What is the experience at Hawl Technologies?" />
    <button onclick="runQuery()">Run Stream Query</button>
    
    <div id="sources-container" style="display: none; margin-top: 20px;">
        <p style="font-weight: bold; font-size: 0.9em; margin-bottom: 8px; color: #94a3b8;">Retrieved Sources:</p>
        <div id="sources" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
    </div>

    <p style="margin-top: 20px; font-weight: bold; color: #94a3b8;">Generator Output:</p>
    <div id="output"></div>

    <script>
        async function runQuery() {
            const query = document.getElementById('query').value;
            const userId = document.getElementById('user_id').value;
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            const sourcesDiv = document.getElementById('sources');
            const sourcesContainer = document.getElementById('sources-container');
            
            output.innerText = "";
            sourcesDiv.innerHTML = "";
            sourcesContainer.style.display = "none";
            status.innerText = "Connecting...";

            try {
                const response = await fetch('http://127.0.0.1:8080/query/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, user_id: userId, top_k: 3 })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');

                    buffer = lines.pop(); // Keep partial line

                    for (const line of lines) {
                        if (line.trim().startsWith('data: ')) {
                            const dataStr = line.trim().substring(6).trim();
                            if (!dataStr) continue;
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.status) {
                                    status.innerText = "Status: " + data.status;
                                } else if (data.sources) {
                                    sourcesContainer.style.display = "block";
                                    sourcesDiv.innerHTML = data.sources.map(s => `
                                        <div style="background: #1e293b; border: 1px solid #334155; padding: 8px 12px; border-radius: 6px; font-size: 0.8em; color: #cbd5e1;">
                                            DOC[${s.doc_id.slice(0, 6)}...] (Score: ${s.score.toFixed(3)})
                                        </div>
                                    `).join('');
                                    status.innerText = "Sources retrieved. Generating...";
                                } else if (data.token) {
                                    output.innerText += data.token;
                                    status.innerText = "Generating answer...";
                                } else if (data.done) {
                                    status.innerText = `Done in ${data.latency_ms}ms (Total)`;
                                }
                            } catch (e) {
                                console.error("Failed to parse", e);
                            }
                        }
                    }
                }
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>

</html>
